<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>Cronos</title>
    <meta name="description" content="Accélérez votre recherche d'emploi avec Cronos. Trouvez des entreprises, découvrez leurs contacts et envoyez des candidatures personnalisées par IA.">
    <meta name="author" content="Cronos" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://spontaneous-sender.lovable.app/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://spontaneous-sender.lovable.app/" />
    <meta property="og:image" content="https://spontaneous-sender.lovable.app/og-image.png">
    <meta property="og:title" content="Cronos — Recherche d'emploi 2.0 | Candidatures automatisées par IA">
    <meta property="og:description" content="Accélérez votre recherche d'emploi avec Cronos. Trouvez des entreprises, découvrez leurs contacts et envoyez des candidatures personnalisées par IA.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@cronos_app" />
    <meta name="twitter:image" content="https://spontaneous-sender.lovable.app/og-image.png">
    <meta name="twitter:title" content="Cronos — Recherche d'emploi 2.0 | Candidatures automatisées par IA">
    <meta name="twitter:description" content="Accélérez votre recherche d'emploi avec Cronos. Trouvez des entreprises, découvrez leurs contacts et envoyez des candidatures personnalisées par IA.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://spontaneous-sender.lovable.app/#website",
          "name": "Cronos",
          "url": "https://spontaneous-sender.lovable.app/",
          "description": "Plateforme de recherche d'emploi 2.0 — trouvez des entreprises, découvrez leurs contacts et envoyez des candidatures spontanées personnalisées par IA.",
          "inLanguage": "fr-FR",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://spontaneous-sender.lovable.app/offres-emploi?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://spontaneous-sender.lovable.app/#organization",
          "name": "Cronos",
          "url": "https://spontaneous-sender.lovable.app/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://spontaneous-sender.lovable.app/favicon.png"
          }
        },
        {
          "@type": "ItemList",
          "@id": "https://spontaneous-sender.lovable.app/#navigation",
          "name": "Pages principales",
          "itemListElement": [
            {
              "@type": "SiteNavigationElement",
              "position": 1,
              "name": "Score CV — Analyseur ATS gratuit",
              "description": "Analysez votre CV face à une offre d'emploi et obtenez un score ATS détaillé.",
              "url": "https://spontaneous-sender.lovable.app/score-cv"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 2,
              "name": "Créer un CV",
              "description": "Créez un CV professionnel en ligne avec nos modèles optimisés ATS.",
              "url": "https://spontaneous-sender.lovable.app/cv-builder"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 3,
              "name": "Offres d'emploi",
              "description": "Consultez les offres d'emploi et postulez automatiquement par IA.",
              "url": "https://spontaneous-sender.lovable.app/offres-emploi"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 4,
              "name": "Tarifs",
              "description": "Découvrez nos formules d'abonnement pour accélérer votre recherche d'emploi.",
              "url": "https://spontaneous-sender.lovable.app/pricing"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 5,
              "name": "Aide",
              "description": "Centre d'aide et support Cronos.",
              "url": "https://spontaneous-sender.lovable.app/help"
            },
            {
              "@type": "SiteNavigationElement",
              "position": 6,
              "name": "Connexion",
              "description": "Connectez-vous à votre compte Cronos.",
              "url": "https://spontaneous-sender.lovable.app/login"
            }
          ]
        }
      ]
    }
    </script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
